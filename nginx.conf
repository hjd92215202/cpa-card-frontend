# 1. 处理 80 端口跳转
server {
    listen 80;
    server_name cfcedd.com www.cfcedd.com;
    return 301 https://www.cfcedd.com$request_uri;
}

# 2. 处理不带 www 的 HTTPS 跳转到带 www 的 HTTPS
server {
    listen 443 ssl;
    server_name cfcedd.com;
    ssl_certificate /etc/letsencrypt/live/cfcedd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cfcedd.com/privkey.pem;
    return 301 https://www.cfcedd.com$request_uri;
}

# 3. 主服务 (www.cfcedd.com)
server {
    listen 443 ssl;
    server_name www.cfcedd.com;

    ssl_certificate /etc/letsencrypt/live/cfcedd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cfcedd.com/privkey.pem;

    # 性能优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        # 这里的 backend 是 docker-compose 中的服务名
        #proxy_pass http://backend:3000/api;
	    proxy_pass http://polymath-backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 显式允许 OPTIONS 预检请求（解决部分 CORS 问题）
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
